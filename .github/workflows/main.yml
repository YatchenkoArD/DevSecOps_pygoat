name: CI

on: [push, pull_request]  # добавь pull_request для PR-ов

jobs:
  test:
    name: Run pytest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies (for Pillow etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y libjpeg-dev zlib1g-dev libpng-dev libwebp-dev libopenjp2-7-dev libtiff-dev libfreetype6-dev liblcms2-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # унифицируем на 3.12 (обнови requirements если нужно)
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run pytest
        run: pytest --cov=. --cov-report=xml
        env:
          DJANGO_SETTINGS_MODULE: pygoat.settings  # ← исправлено!

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint with Flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 .

  sast_scan:
    name: Run Bandit Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libjpeg-dev zlib1g-dev ...

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt bandit

      - run: bandit -ll -ii -r . -f json -o report-bandit.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-findings
          path: report-bandit.json

  sca_scan:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
          vulnerability-service: osv
          # fail-on не существует → по умолчанию фейлит при vuln
          # если хочешь НЕ фейлить: internal-be-careful-allow-failure: true
          summary: true  # покажет summary в job

  image_scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-docker-action@v5  # обновлено до v5

      - name: Build Docker Image
        run: docker build -f Dockerfile -t pygoat:${{ github.sha }} .

      # Login только если пушить (можно убрать)
      # - name: Login to Docker Hub ...

      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          only-severities: critical,high
          sarif-file: scout-report.sarif
          image: pygoat:${{ github.sha }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-scout-findings
          path: scout-report.sarif
