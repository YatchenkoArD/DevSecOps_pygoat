name: CI

on: [push, pull_request]

jobs:
  test:
    name: Run pytest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run pytest
        run: pytest --cov=. --cov-report=xml
        env:
          DJANGO_SETTINGS_MODULE: pygoat.settings

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  lint:
    name: Lint with Flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install flake8
      - run: flake8 .

  sast_scan:
    name: Run Bandit Scan (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          pip install -r requirements.txt
          pip install bandit
      - name: Run Bandit
        run: bandit -ll -ii -r . -f json -o report-bandit.json
        continue-on-error: true  # временно, пока изучаем intentionally vuln
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-findings
          path: report-bandit.json

  sca_scan:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Run pip-audit (official action)
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt
          vulnerability-service: osv
          summary: true
          internal-be-careful-allow-failure: true   # раскомментируй, если хочешь НЕ фейлить пайплайн при vuln (для PyGoat полезно)

  image_scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  
      - name: Set Up Docker
        uses: docker/setup-docker-action@v4
        with:
          version: latest
      - name: Build Docker Image
        run: docker build -f Dockerfile -t pygoat:${{ github.sha }} .
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REPO_USER }}
          password: ${{ secrets.REPO_PWD }}
      - name: Docker Scout Scan
        uses: docker/scout-action@v1
        with:
          command: quickview,cves
          only-severities: critical,high
          sarif-file: scout-report.sarif
          image: pygoat:${{ github.sha }}
      - name: Upload Artifact 
        uses: actions/upload-artifact@v4 
        if: always() 
        with: 
          name: docker-scout-findings 
          path: scout-report.sarif
