name: CI

on: [push]

jobs:
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Set up Bandin
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -ll -ii -r . -f json -o report-bandit.json 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-findings
          path: report-bandit.json

  image_scan:
      name: Build Docker Image and Scan It
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout code
          uses: actions/checkout@v4         
  
        - name: Set Up Docker
          uses: docker/setup-docker-action@v4
          with:
            version: latest
  
        - name: Build Docker Image
          run: docker build -f Dockerfile -t pygoat:${{ github.sha }} .
  
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.REPO_USER }}
            password: ${{ secrets.REPO_PWD }}
  
        - name: Docker Scout Scan
          uses: docker/scout-action@v1        
          with:
            command: quickview,cves
            only-severities: critical,high
            sarif-file: scout-report.sarif
            image: pygoat:${{ github.sha }}
            
        - name: Upload Artifact
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: docker-scout-findings
            path: scout-report.sarif   
      
          
