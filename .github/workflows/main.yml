name: CI

on: [push]

jobs:
  test:
    name: Run pytest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run pytest
        run: pytest
        env:
          DJANGO_SETTINGS_MODULE: pytest.ini

      # Опционально: upload coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  
  lint:
    name: Lint with Flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5   
        with:
          python-version: '3.12'        

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: flake8 .                     
  
  sast_scan:
    name: Run Bandit Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8

      - name: Set up Bandin
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -ll -ii -r . -f json -o report-bandit.json 

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-findings
          path: report-bandit.json

  image_scan:
      name: Build Docker Image and Scan It
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout code
          uses: actions/checkout@v4         
  
        - name: Set Up Docker
          uses: docker/setup-docker-action@v4
          with:
            version: latest
  
        - name: Build Docker Image
          run: docker build -f Dockerfile -t pygoat:${{ github.sha }} .
  
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.REPO_USER }}
            password: ${{ secrets.REPO_PWD }}
  
        - name: Docker Scout Scan
          uses: docker/scout-action@v1        
          with:
            command: quickview,cves
            only-severities: critical,high
            sarif-file: scout-report.sarif
            image: pygoat:${{ github.sha }}
            
        - name: Upload Artifact
          uses: actions/upload-artifact@v4
          if: always()
          with:
            name: docker-scout-findings
            path: scout-report.sarif   
  sca_scan:
    name: SCA - Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: []  # можно запускать параллельно, без зависимостей
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'  # или та, что у тебя в проекте

      - name: Run pip-audit (official action)
        uses: pypa/gh-action-pip-audit@v1.1.0  # актуальная версия на 2026
        with:
          inputs: requirements.txt          # путь к твоему файлу
          # Опционально:
          format: sarif                   # для интеграции с GitHub Security
          output: pip-audit.sarif
          fail-on: high                   # fail при high+ severity (по умолчанию не фейлит)
          vulnerability-service: osv      # или pypi (default)

      # Если хочешь артефакт (альтернатива SARIF)
      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-pip-audit-report
          path: pip-audit.sarif  # если указал format: sarif
          
